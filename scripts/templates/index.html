<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG System Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #333;
            font-size: 32px;
            font-weight: bold;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f8f8;
            padding: 12px;
            text-align: left;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-error {
            background: #f8d7da;
            color: #721c24;
        }

        .refresh-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #0056b3;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 RAG System Dashboard</h1>

        <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-label">总查询数</div>
                <div class="stat-value" id="total-queries">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总摄取数</div>
                <div class="stat-value" id="total-ingestions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">成功摄取</div>
                <div class="stat-value" id="successful-ingestions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">平均查询延迟</div>
                <div class="stat-value" id="avg-latency">0ms</div>
            </div>
        </div>

        <div class="section">
            <h2>📊 最近查询</h2>
            <table id="queries-table">
                <thead>
                    <tr>
                        <th>查询内容</th>
                        <th>结果数</th>
                        <th>延迟 (秒)</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="queries-body">
                    <tr>
                        <td colspan="4" class="empty-state">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2>📁 最近摄取</h2>
            <table id="ingestions-table">
                <thead>
                    <tr>
                        <th>文件路径</th>
                        <th>分块数</th>
                        <th>状态</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="ingestions-body">
                    <tr>
                        <td colspan="4" class="empty-state">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();

                document.getElementById('total-queries').textContent = stats.total_queries || 0;
                document.getElementById('total-ingestions').textContent = stats.total_ingestions || 0;
                document.getElementById('successful-ingestions').textContent = stats.successful_ingestions || 0;

                const avgLatency = (stats.avg_query_latency || 0) * 1000;
                document.getElementById('avg-latency').textContent = avgLatency.toFixed(0) + 'ms';
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function loadQueries() {
            try {
                const response = await fetch('/api/queries');
                const queries = await response.json();

                const tbody = document.getElementById('queries-body');

                if (queries.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无查询记录</td></tr>';
                    return;
                }

                tbody.innerHTML = queries.map(q => `
                    <tr>
                        <td>${q.query}</td>
                        <td>${q.results_count}</td>
                        <td>${q.latency.toFixed(3)}</td>
                        <td>${formatTimestamp(q.timestamp)}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load queries:', error);
            }
        }

        async function loadIngestions() {
            try {
                const response = await fetch('/api/ingestions');
                const ingestions = await response.json();

                const tbody = document.getElementById('ingestions-body');

                if (ingestions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无摄取记录</td></tr>';
                    return;
                }

                tbody.innerHTML = ingestions.map(i => `
                    <tr>
                        <td>${i.file_path}</td>
                        <td>${i.chunks}</td>
                        <td><span class="badge ${i.success ? 'badge-success' : 'badge-error'}">${i.success ? '成功' : '失败'}</span></td>
                        <td>${formatTimestamp(i.timestamp)}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load ingestions:', error);
            }
        }

        function loadData() {
            loadStats();
            loadQueries();
            loadIngestions();
        }

        // Initial load
        loadData();

        // Auto refresh every 5 seconds
        setInterval(loadData, 5000);
    </script>
</body>
</html>

# RAG-MCP-SERVER 配置文件

# LLM 配置
llm:
  provider: dashscope
  model: qwen-max
  api_key: "${DASHSCOPE_API_KEY}"

# Embedding 配置
embedding:
  provider: dashscope
  model: text-embedding-v4
  api_key: "${DASHSCOPE_API_KEY}"

# Vision LLM 配置
vision_llm:
  provider: dashscope
  model: qwen-vl-max
  api_key: "${DASHSCOPE_API_KEY}"

# 向量存储配置
vector_store:
  type: milvus
  uri: "./data/db/milvus.db"
  collection_name: rag_knowledge_hub
  dense_dim: 2048

# 文本分块配置
splitter:
  chunk_size: 1000
  chunk_overlap: 200

# 检索配置
retrieval:
  sparse_backend: bm25
  top_k: 20
  dense_weight: 0.5
  sparse_weight: 0.5

# 重排序配置
rerank:
  backend: cross_encoder
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 10

# 评估配置
evaluation:
  enabled: false
